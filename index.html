<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfólio | Carlos Bergson</title>
  <script>
    (function () {
      var built = './dist/index.html';
      fetch(built, { method: 'HEAD' })
        .then(function (response) {
          if (response.ok) {
            window.location.replace(built);
            return;
          }
          document.documentElement.classList.add('show-fallback');
        })
        .catch(function () {
          document.documentElement.classList.add('show-fallback');
        });
    })();
  </script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 40rem;
      margin: 4rem auto;
      padding: 0 1.5rem;
      color: #42446e;
      line-height: 1.6;
    }
    code, pre {
      background: #f0f1f3;
      border-radius: 8px;
    }
    code { padding: 0.15rem 0.4rem; }
    pre { padding: 1rem; overflow-x: auto; }
    .fallback { display: none; }
    html.show-fallback .fallback { display: block; }
    html.show-fallback .loading { display: none; }
  </style>
</head>
<body>
  <p class="loading">Carregando portfólio...</p>
  <div class="fallback">
    <h1>Portfólio migrado para Astro</h1>
    <p>Para visualizar o site localmente, use o servidor de desenvolvimento:</p>
    <pre>npm install
npm run dev</pre>
    <p>Depois acesse <a href="http://localhost:4321/">http://localhost:4321/</a></p>
    <p>Para gerar os arquivos estáticos:</p>
    <pre>npm run build
npm run preview</pre>
  </div>
</body>
</html>
